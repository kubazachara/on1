<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceny+ Next²</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f17;
  --glass: rgba(255,255,255,0.06);
  --glass2: rgba(255,255,255,0.09);
  --text:#eaf0ff;
  --muted:#8b93a7;
  --accent:#6ee7ff;
  --good:#7CFF6B;
  --warn:#FFD36E;
  --bad:#FF5C5C;
}

.light{
  --bg:#eef2ff;
  --glass: rgba(255,255,255,0.7);
  --glass2: rgba(255,255,255,0.9);
  --text:#0f172a;
  --muted:#475569;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* GLASS BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 20% 20%, #6ee7ff33, transparent 40%),
              radial-gradient(circle at 80% 80%, #7CFF6B22, transparent 40%);
  filter: blur(60px);
  z-index:-1;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:16px;
  align-items:center;
}

.logo{
  font-weight:800;
  font-size:20px;
}

.logo span{color:var(--accent);}

.menuBtn{
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  right:-300px;
  width:260px;
  height:100%;
  background:var(--glass);
  backdrop-filter: blur(20px);
  padding:20px;
  transition:0.3s;
  z-index:10;
}

.menu.open{right:0;}

.menu h3{margin-bottom:10px;}
.menu button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--glass2);
  color:var(--text);
  cursor:pointer;
}

/* CARD */
.card{
  margin:20px;
  padding:20px;
  background:var(--glass);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  backdrop-filter: blur(20px);
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:none;
  background:var(--glass2);
  color:var(--text);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  font-weight:800;
  cursor:pointer;
}

/* RESULT */
.result{
  margin-top:15px;
  font-size:18px;
}

/* HISTORY */
.item{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:var(--glass2);
  display:flex;
  justify-content:space-between;
}

/* AI BOX */
.ai{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(110,231,255,0.15);
  font-size:13px;
}

/* DELETE */
.del{
  color:var(--bad);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">Oceny+ <span>Next²</span></div>
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <h3>Menu</h3>

  <button onclick="toggleTheme()">Tryb jasny/ciemny</button>
  <button onclick="toggleAI()">AI: ON/OFF</button>
  <button onclick="clearHistory()">Wyczyść historię</button>

  <p style="margin-top:15px;color:var(--muted);font-size:12px">
    Oceny+ Next²<br>
    system dla nauczycieli
  </p>
</div>

<!-- MAIN -->
<div class="card">
  <h3>Kalkulator punktów</h3>

  <input id="p" type="number" placeholder="Zdobyte punkty">
  <input id="m" type="number" placeholder="Maks punkty">

  <button class="btn" onclick="calc()">Oblicz</button>

  <div class="result" id="res"></div>
  <div class="ai" id="ai"></div>

  <div id="hist"></div>
</div>

<script>
let ai = true;
let history = [];

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

function toggleAI(){
  ai = !ai;
  alert("AI: " + (ai ? "ON" : "OFF"));
}

function grade(p){
  if(p===100) return 6;
  if(p>=91) return 5;
  if(p>=76) return 4;
  if(p>=51) return 3;
  if(p>=30) return 2;
  return 1;
}

function aiLogic(p){
  if(p>=91) return "Nie trzeba podciągać – masz 5 lub 6.";
  if(p>=76) return "Brakuje ok. " + (91-p).toFixed(0) + "% do 5.";
  if(p>=51) return "Do 4 brakuje ok. " + (76-p).toFixed(0) + "%.";
  if(p>=30) return "Do 3 brakuje ok. " + (51-p).toFixed(0) + "%.";
  return "Trzeba dużo poprawy.";
}

function calc(){
  let p = +document.getElementById("p").value;
  let m = +document.getElementById("m").value;

  let percent = (p/m)*100;
  let g = grade(percent);

  document.getElementById("res").innerHTML =
    "Wynik: " + percent.toFixed(1) + "% → ocena: " + g;

  document.getElementById("ai").innerHTML =
    ai ? "AI: " + aiLogic(percent) : "";

  history.unshift({p, m, percent, g});

  renderHistory();
}

function renderHistory(){
  let h = document.getElementById("hist");
  h.innerHTML = history.map((x,i)=>
    `<div class="item">
      <div>${x.percent.toFixed(1)}% → ${x.g}</div>
      <div class="del" onclick="del(${i})">usuń</div>
    </div>`
  ).join("");
}

function del(i){
  history.splice(i,1);
  renderHistory();
}

function clearHistory(){
  history=[];
  renderHistory();
}
</script>

</body>
</html>
