<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceny+ Next</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {  
  --bg: #0d0f14;  
  --card: #161920;  
  --border: #252830;  
  --accent: #7fff6e;  
  --accent2: #ffdd57;  
  --accent3: #ff6b6b;  
  --text: #eef0f5;  
  --muted: #5a5f70;  
  --grade6: #7fff6e;  
  --grade5: #57e9ff;  
  --grade4: #ffdd57;  
  --grade3: #ffaa33;  
  --grade2: #ff7043;  
  --grade1: #ff3d3d;  
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--bg);
color: var(--text);
font-family: 'Syne', sans-serif;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: flex-start;
padding: 30px 16px 60px;
}

/* DOT BACKGROUND */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
background-size: 28px 28px;
pointer-events: none;
z-index: 0;
}

.app {
position: relative;
z-index: 1;
width: 100%;
max-width: 460px;
display: flex;
flex-direction: column;
gap: 16px;
}

/* HEADER */
.header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 8px 0 4px;
animation: fadeDown 0.5s ease both;
}

/* 🔥 ANIMOWANE LOGO */
.logo {
font-size: 28px;
font-weight: 800;
letter-spacing: -1px;
position: relative;
display: inline-block;
animation: pulse 2.4s ease-in-out infinite;
}

.logo span {
color: var(--accent);
text-shadow: 0 0 12px #7fff6e80, 0 0 30px #7fff6e30;
animation: glow 2.4s ease-in-out infinite;
}

.tag {
font-family: 'DM Mono', monospace;
font-size: 11px;
background: var(--border);
color: var(--muted);
padding: 4px 10px;
border-radius: 20px;
}

/* CARD */
.card {
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 28px 24px;
animation: fadeUp 0.5s ease both;
}

/* ANIMACJE LOGO */
@keyframes pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.05); }
}

@keyframes glow {
0%, 100% { filter: drop-shadow(0 0 0px #7fff6e00); }
50% { filter: drop-shadow(0 0 12px #7fff6eaa); }
}

/* reszta Twoich styli bez zmian... */

@keyframes fadeDown {
from { opacity: 0; transform: translateY(-12px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(14px); }
to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="logo">Oceny<span>+ Next</span></div>
    <div class="tag">kalkulator ocen</div>
  </div>

  <!-- reszta Twojego kodu zostaje IDENTYCZNA -->
  <!-- (kalkulator, historia, skale itd.) -->

</div>
</body>
</html>
